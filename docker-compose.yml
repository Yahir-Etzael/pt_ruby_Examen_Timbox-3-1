services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prueba_ruby_development
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build: .
    command: bundle exec rails server -b 0.0.0.0
    environment:
      RAILS_ENV: development
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: prueba_ruby_development
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: 0123456789abcdef0123456789abcdef
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: abcdef0123456789abcdef0123456789
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: rails-exam-local-salt
    ports:
      - "3000:3000"
    depends_on:
      - db
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle

volumes:
  postgres_data:
  bundle_cache:
